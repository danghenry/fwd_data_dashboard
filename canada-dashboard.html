<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canada Economic Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand:#0e64ac; --dark:#0a4a7e; --darker:#0d1f2d;
  --tint:#e8f1f8; --tint2:#d0e4f5; --bg:#f4f8fc; --card:#ffffff;
  --mu:#5a7a90; --border:#c2d6e8; --text:#0d1f2d;
  --pos:#1a7a4a; --neg:#c0390a; --pos-bg:#e8f5ee; --neg-bg:#fceee8;
}
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); }

.db-header { background:var(--darker); padding:1.25rem 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid var(--brand); }
.db-title { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; color:#fff; }
.db-subtitle { font-family:'IBM Plex Mono',monospace; font-size:0.62rem; color:var(--mu); text-transform:uppercase; letter-spacing:.1em; margin-top:.2rem; }
.db-status { font-family:'IBM Plex Mono',monospace; font-size:0.65rem; color:var(--mu); display:flex; align-items:center; gap:.45rem; }
.db-dot { width:7px; height:7px; border-radius:50%; background:var(--mu); flex-shrink:0; }
.db-dot.live { background:#4caf82; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

.db-main { max-width:1100px; margin:0 auto; padding:1.75rem 1.5rem; }

/* Cards */
.db-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.5rem; }
.db-card { background:var(--card); border:1.5px solid var(--border); border-radius:6px; padding:1.2rem 1.3rem; cursor:pointer; transition:border-color .15s,box-shadow .15s,transform .1s; position:relative; overflow:hidden; }
.db-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--border); transition:background .15s; }
.db-card:hover { border-color:var(--brand); box-shadow:0 2px 14px rgba(14,100,172,.1); transform:translateY(-1px); }
.db-card:hover::before,.db-card.active::before { background:var(--brand); }
.db-card.active { border-color:var(--brand); box-shadow:0 2px 16px rgba(14,100,172,.14); }
.db-card-lbl { font-family:'IBM Plex Mono',monospace; font-size:.61rem; text-transform:uppercase; letter-spacing:.1em; color:var(--mu); margin-bottom:.55rem; }
.db-card-val { font-family:'Playfair Display',serif; font-size:1.65rem; font-weight:700; color:var(--text); line-height:1.1; margin-bottom:.4rem; }
.db-card-val.loading { color:var(--border); animation:pulse 1.5s infinite; }
.db-card-per { font-family:'IBM Plex Mono',monospace; font-size:.58rem; color:var(--mu); margin-bottom:.55rem; }
.db-card-chg { display:inline-flex; align-items:center; gap:.2rem; font-family:'IBM Plex Mono',monospace; font-size:.68rem; padding:.15em .5em; border-radius:2px; white-space:nowrap; }
.db-card-chg.pos { background:var(--pos-bg); color:var(--pos); }
.db-card-chg.neg { background:var(--neg-bg); color:var(--neg); }
.db-card-chg.neu { background:var(--tint); color:var(--mu); }

/* Chart panel */
.db-chart-panel { background:var(--card); border:1.5px solid var(--border); border-radius:6px; padding:1.5rem; }
.db-chart-top { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1.25rem; }
.db-chart-title { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; color:var(--text); }
.db-chart-src { font-family:'IBM Plex Mono',monospace; font-size:.58rem; color:var(--mu); margin-top:.2rem; }
.db-controls { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
.db-dr { display:flex; align-items:center; gap:.35rem; font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--mu); }
.db-dr input[type=date] { font-family:'IBM Plex Mono',monospace; font-size:.7rem; padding:.32rem .55rem; border:1.5px solid var(--border); border-radius:3px; color:var(--text); background:#fff; outline:none; cursor:pointer; transition:border-color .15s; }
.db-dr input[type=date]:focus { border-color:var(--brand); }
.db-apply { font-family:'IBM Plex Mono',monospace; font-size:.68rem; padding:.35rem .9rem; background:var(--brand); color:#fff; border:none; border-radius:3px; cursor:pointer; letter-spacing:.05em; transition:background .15s; }
.db-apply:hover { background:var(--dark); }
.db-msg { font-family:'IBM Plex Mono',monospace; font-size:.72rem; padding:.6rem .9rem; border-radius:3px; margin-bottom:.75rem; display:none; }
.db-msg.show { display:block; }
.db-msg.loading { background:var(--tint); color:var(--mu); }
.db-msg.error { background:#fceee8; color:#7a1a1a; }
.db-chart-wrap { position:relative; height:290px; }

.db-footer { margin-top:1.1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; }
.db-foot-src { font-family:'IBM Plex Mono',monospace; font-size:.58rem; color:var(--mu); }
.db-foot-src a { color:var(--brand); text-decoration:none; }
.db-foot-src a:hover { text-decoration:underline; }
.db-foot-ts { font-family:'IBM Plex Mono',monospace; font-size:.58rem; color:var(--mu); }

@media(max-width:800px){ .db-cards{grid-template-columns:repeat(2,1fr);} }
@media(max-width:480px){ .db-cards{grid-template-columns:1fr;} .db-header{flex-direction:column;gap:.5rem;} }
</style>
</head>
<body>

<div class="db-header">
  <div>
    <div class="db-title">Canada Economic Dashboard</div>
    <div class="db-subtitle">Key Indicators &mdash; Updated from CSV Data</div>
  </div>
  <div class="db-status">
    <div class="db-dot" id="db-dot"></div>
    <span id="db-status-txt">Loading…</span>
  </div>
</div>

<div class="db-main">

  <div class="db-cards">
    <div class="db-card active" data-key="population">
      <div class="db-card-lbl">Population</div>
      <div class="db-card-val loading" id="val-population">—</div>
      <div class="db-card-per" id="per-population"></div>
      <span class="db-card-chg neu" id="chg-population">…</span>
    </div>
    <div class="db-card" data-key="gdp">
      <div class="db-card-lbl">GDP</div>
      <div class="db-card-val loading" id="val-gdp">—</div>
      <div class="db-card-per" id="per-gdp"></div>
      <span class="db-card-chg neu" id="chg-gdp">…</span>
    </div>
    <div class="db-card" data-key="inflation">
      <div class="db-card-lbl">Inflation Rate (CPI YoY)</div>
      <div class="db-card-val loading" id="val-inflation">—</div>
      <div class="db-card-per" id="per-inflation"></div>
      <span class="db-card-chg neu" id="chg-inflation">…</span>
    </div>
    <div class="db-card" data-key="unemployment">
      <div class="db-card-lbl">Unemployment Rate</div>
      <div class="db-card-val loading" id="val-unemployment">—</div>
      <div class="db-card-per" id="per-unemployment"></div>
      <span class="db-card-chg neu" id="chg-unemployment">…</span>
    </div>
  </div>

  <div class="db-chart-panel">
    <div class="db-chart-top">
      <div>
        <div class="db-chart-title" id="chart-title">Population — Historical Trend</div>
        <div class="db-chart-src" id="chart-src">Statistics Canada</div>
      </div>
      <div class="db-controls">
        <div class="db-dr">
          <span>From</span><input type="date" id="dr-from" value="2010-01-01">
          <span>To</span><input type="date" id="dr-to">
        </div>
        <button class="db-apply" id="btn-apply">Apply</button>
      </div>
    </div>
    <div class="db-msg" id="chart-msg"></div>
    <div class="db-chart-wrap"><canvas id="db-chart"></canvas></div>
  </div>

  <div class="db-footer">
    <div class="db-foot-src">
      Sources:
      <a href="https://www150.statcan.gc.ca" target="_blank">Statistics Canada</a>
      &middot;
      <a href="https://www.bankofcanada.ca" target="_blank">Bank of Canada</a>
    </div>
    <div class="db-foot-ts" id="db-ts"></div>
  </div>

</div>

<script>
(function(){
'use strict';

// ── Configuration ─────────────────────────────────────────────────
// Set BASE_URL to your GitHub Pages raw content base, e.g.:
// 'https://raw.githubusercontent.com/USERNAME/REPO/main/data/'
// For local testing use '' (expects CSV files in a /data/ folder)
var BASE_URL = 'https://raw.githubusercontent.com/danghenry/fwd_data_dashboard/main/data/';

var INDICATORS = {
  population: {
    label:      'Population',
    file:       'population.csv',
    dateCol:    'year',
    valCol:     'value',
    dateType:   'year',       // 'year' | 'month'
    fmt:        fmtPop,
    chgType:    'pct',        // 'pct' | 'pp' (percentage points)
    chgPeriod:  'vs prior year',
    source:     'Statistics Canada, Table 17-10-0009'
  },
  gdp: {
    label:      'GDP',
    file:       'gdp.csv',
    dateCol:    'year',
    valCol:     'value_billions_cad',
    dateType:   'year',
    fmt:        fmtGDP,
    chgType:    'pct',
    chgPeriod:  'vs prior year',
    source:     'Statistics Canada, Table 36-10-0434'
  },
  inflation: {
    label:      'Inflation Rate (CPI YoY)',
    file:       'inflation.csv',
    dateCol:    'date',
    valCol:     'rate_pct',
    dateType:   'month',
    fmt:        fmtPct,
    chgType:    'pp',
    chgPeriod:  'vs prior month',
    source:     'Bank of Canada'
  },
  unemployment: {
    label:      'Unemployment Rate',
    file:       'unemployment.csv',
    dateCol:    'date',
    valCol:     'rate_pct',
    dateType:   'month',
    fmt:        fmtPct,
    chgType:    'pp',
    chgPeriod:  'vs prior month',
    source:     'Statistics Canada, Table 14-10-0287'
  }
};

// ── State ─────────────────────────────────────────────────────────
var cache     = {};
var activeKey = 'population';
var chartInst = null;
var loaded    = 0;
var total     = Object.keys(INDICATORS).length;
var today     = new Date().toISOString().slice(0,10);
document.getElementById('dr-to').value = today;

// ── Formatters ────────────────────────────────────────────────────
function fmtPop(v) {
  v = parseFloat(v);
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  return Math.round(v).toLocaleString('en-CA');
}
function fmtGDP(v) {
  v = parseFloat(v);
  if (v >= 1000) return '$'+(v/1000).toFixed(2)+'T';
  return '$'+v.toFixed(1)+'B';
}
function fmtPct(v) { return parseFloat(v).toFixed(1)+'%'; }

function fmtDateLabel(str, type) {
  if (type === 'year') return str;
  var d = new Date(str+'T00:00:00');
  return d.toLocaleDateString('en-CA',{year:'numeric',month:'short'});
}

// ── CSV parser ────────────────────────────────────────────────────
function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim(); });
  return lines.slice(1).map(function(line){
    var vals = line.split(',');
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = (vals[i]||'').trim(); });
    return obj;
  }).filter(function(r){ return r[headers[0]]; });
}

// ── Fetch a CSV ───────────────────────────────────────────────────
function fetchCSV(key, cb) {
  var ind = INDICATORS[key];
  var url = BASE_URL + ind.file + '?_=' + Date.now();
  fetch(url)
    .then(function(r){
      if (!r.ok) throw new Error('HTTP '+r.status+' fetching '+ind.file);
      return r.text();
    })
    .then(function(text){
      var rows = parseCSV(text);
      // Sort by date column ascending
      rows.sort(function(a,b){ return a[ind.dateCol].localeCompare(b[ind.dateCol]); });
      cb(null, rows);
    })
    .catch(function(e){ cb(e.message); });
}

// ── Update a summary card ─────────────────────────────────────────
function updateCard(key, rows) {
  var ind  = INDICATORS[key];
  var last = rows[rows.length-1];
  var prev = rows.length > 1 ? rows[rows.length-2] : null;
  var v    = parseFloat(last[ind.valCol]);

  document.getElementById('val-'+key).textContent = ind.fmt(v);
  document.getElementById('val-'+key).classList.remove('loading');
  document.getElementById('per-'+key).textContent =
    fmtDateLabel(last[ind.dateCol], ind.dateType) +
    (ind.dateType==='year' ? ' (Annual)' : ' (Monthly)');

  if (prev) {
    var pv   = parseFloat(prev[ind.valCol]);
    var diff = v - pv;
    var isPos = diff >= 0;
    var arrow = isPos ? '▲' : '▼';
    var cls   = diff === 0 ? 'neu' : (isPos ? 'pos' : 'neg');
    var chgTxt;
    if (ind.chgType === 'pct') {
      var pct = pv !== 0 ? (diff/Math.abs(pv)*100) : 0;
      chgTxt = arrow+' '+(isPos?'+':'')+pct.toFixed(1)+'% '+ind.chgPeriod;
    } else {
      chgTxt = arrow+' '+(isPos?'+':'')+diff.toFixed(1)+' pp '+ind.chgPeriod;
    }
    var el = document.getElementById('chg-'+key);
    el.textContent = chgTxt;
    el.className = 'db-card-chg '+cls;
  }
}

// ── Draw chart ────────────────────────────────────────────────────
function drawChart(key, fromDate, toDate) {
  var rows = cache[key];
  var ind  = INDICATORS[key];
  if (!rows) return;

  // Normalise from/to to comparable format
  var normFrom = fromDate ? fromDate.slice(0, ind.dateType==='year'?4:10) : '';
  var normTo   = toDate   ? toDate.slice(0,   ind.dateType==='year'?4:10) : '';

  var filtered = rows.filter(function(r){
    var d = r[ind.dateCol].slice(0, ind.dateType==='year'?4:10);
    return (!normFrom || d >= normFrom) && (!normTo || d <= normTo);
  });

  if (!filtered.length) {
    showMsg('error','No data in selected range. Try widening the dates.');
    return;
  }
  hideMsg();

  var labels = filtered.map(function(r){ return r[ind.dateCol]; });
  var values = filtered.map(function(r){ return parseFloat(r[ind.valCol]); });

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  chartInst = new Chart(document.getElementById('db-chart').getContext('2d'), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: ind.label,
        data: values,
        borderColor: '#0e64ac',
        backgroundColor: 'rgba(14,100,172,0.06)',
        borderWidth: 2.5,
        pointRadius: filtered.length > 48 ? 0 : 3.5,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1f2d',
          titleFont: { family:'IBM Plex Mono', size:11 },
          bodyFont:  { family:'IBM Plex Sans',  size:12 },
          callbacks: {
            title: function(items){ return fmtDateLabel(items[0].label, ind.dateType); },
            label: function(item) { return ' '+ind.label+': '+ind.fmt(item.raw); }
          }
        }
      },
      scales: {
        x: {
          grid: { color:'#deeaf5' },
          ticks: {
            font: { family:'IBM Plex Mono', size:10 }, color:'#5a7a90',
            maxTicksLimit: 12,
            callback: function(val){ return fmtDateLabel(this.getLabelForValue(val), ind.dateType); }
          }
        },
        y: {
          grid: { color:'#deeaf5' },
          ticks: {
            font: { family:'IBM Plex Mono', size:10 }, color:'#5a7a90',
            callback: function(v){ return ind.fmt(v); }
          }
        }
      }
    }
  });

  document.getElementById('chart-title').textContent = ind.label+' \u2014 Historical Trend';
  document.getElementById('chart-src').textContent = ind.source;
}

// ── Messages ──────────────────────────────────────────────────────
function showMsg(type, txt) {
  var el = document.getElementById('chart-msg');
  el.className = 'db-msg show '+type; el.textContent = txt;
}
function hideMsg() { document.getElementById('chart-msg').className = 'db-msg'; }

// ── Card click ────────────────────────────────────────────────────
function setActive(key) {
  activeKey = key;
  document.querySelectorAll('.db-card').forEach(function(c){
    c.classList.toggle('active', c.dataset.key === key);
  });
  if (cache[key]) {
    drawChart(key, document.getElementById('dr-from').value, document.getElementById('dr-to').value);
  } else {
    showMsg('loading', 'Loading '+INDICATORS[key].label+' data…');
  }
}
document.querySelectorAll('.db-card').forEach(function(c){
  c.addEventListener('click', function(){ setActive(c.dataset.key); });
});

// ── Apply date range ──────────────────────────────────────────────
document.getElementById('btn-apply').addEventListener('click', function(){
  var from = document.getElementById('dr-from').value;
  var to   = document.getElementById('dr-to').value;
  if (!from || !to || from > to) { showMsg('error','Please enter a valid date range.'); return; }
  if (cache[activeKey]) drawChart(activeKey, from, to);
});

// ── Load all CSVs ─────────────────────────────────────────────────
function onOneLoaded() {
  loaded++;
  if (loaded === total) {
    document.getElementById('db-dot').classList.add('live');
    var now = new Date();
    document.getElementById('db-status-txt').textContent =
      'Updated '+now.toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('db-ts').textContent =
      'Data loaded: '+now.toLocaleString('en-CA');
  }
}

showMsg('loading', 'Loading data…');

Object.keys(INDICATORS).forEach(function(key){
  fetchCSV(key, function(err, rows){
    if (err) {
      document.getElementById('val-'+key).textContent = 'Error';
      document.getElementById('val-'+key).classList.remove('loading');
      document.getElementById('chg-'+key).textContent = err;
      document.getElementById('chg-'+key).className = 'db-card-chg neg';
      onOneLoaded(); return;
    }
    cache[key] = rows;
    updateCard(key, rows);
    if (key === activeKey) {
      drawChart(key, document.getElementById('dr-from').value, today);
    }
    onOneLoaded();
  });
});

})();
</script>
</body>
</html>
